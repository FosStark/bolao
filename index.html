<html lang="pt-BR">

<meta charset="UTF-8">

<title>Bolão Copa do Mundo 2026</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
  body{background:linear-gradient(160deg,#0a1f44 0%,#0d2b5e 40%,#06283d 100%);min-height:100vh;color:#eaf0fb;}
  #app{max-width:820px;margin:0 auto;padding:16px;display:flex;flex-direction:column;gap:14px;}
  .hero{text-align:center;padding:20px 12px 8px;}
  .hero-badge{display:inline-block;background:#ffd23f;color:#0a1f44;font-weight:800;font-size:12px;letter-spacing:1px;padding:5px 14px;border-radius:20px;}
  .hero h1{font-size:32px;margin:10px 0 4px;font-weight:800;color:#ffd23f;}
  .hero p{color:#9fb3d4;font-size:14px;}
  .card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:16px;}
  .card h2{font-size:19px;margin-bottom:8px;}
  .card h3{font-size:16px;margin-bottom:8px;}
  .muted{color:#9fb3d4;}
  .small{font-size:12px;}
  .enter{text-align:center;display:flex;flex-direction:column;gap:12px;align-items:center;}
  .inp{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);color:#fff;border-radius:10px;padding:10px 12px;font-size:15px;outline:none;}
  .inp:focus{border-color:#ffd23f;}
  .inp.big{width:100%;max-width:320px;text-align:center;font-size:17px;}
  select.inp{cursor:pointer;width:100%;}
  select.inp option{background:#0d2b5e;}
  .btn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:11px 20px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:.15s;}
  .btn:hover{background:rgba(255,255,255,0.2);}
  .btn.primary{background:#ffd23f;color:#0a1f44;border:none;}
  .btn.primary:hover{filter:brightness(1.08);}
  .btn.danger{background:rgba(255,90,90,0.18);border-color:rgba(255,90,90,0.4);color:#ff9b9b;}
  .btn.sm{padding:6px 12px;font-size:12px;}
  .save-fixed{position:sticky;bottom:14px;width:100%;box-shadow:0 6px 20px rgba(0,0,0,.4);}
  .link{background:none;border:none;color:#ffd23f;cursor:pointer;font-size:13px;text-decoration:underline;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:6px;}
  .chip{background:rgba(255,210,63,0.15);border:1px solid rgba(255,210,63,0.4);color:#ffd23f;padding:4px 10px;border-radius:14px;font-size:13px;cursor:pointer;}
  .chip:hover{background:rgba(255,210,63,0.3);}
  .userbar{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.06);border-radius:12px;padding:10px 14px;font-size:14px;}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;}
  .tab{flex:1;min-width:78px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#9fb3d4;padding:9px 4px;border-radius:10px;font-size:11.5px;font-weight:700;cursor:pointer;}
  .tab.on{background:#ffd23f;color:#0a1f44;border-color:#ffd23f;}
  .champ-pick{display:flex;flex-direction:column;gap:8px;}
  .round-head{width:100%;display:flex;justify-content:space-between;align-items:center;background:none;border:none;color:#fff;font-size:17px;font-weight:800;cursor:pointer;padding:2px;}
  .round-head.static{cursor:default;margin-bottom:8px;}
  .matches{display:flex;flex-direction:column;gap:10px;margin-top:12px;}
  .match{background:rgba(0,0,0,0.2);border-radius:10px;padding:10px;}
  .match-meta{display:flex;justify-content:space-between;margin-bottom:6px;}
  .grp{background:rgba(255,210,63,0.18);color:#ffd23f;font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px;}
  .match-row{display:flex;align-items:center;gap:6px;}
  .team{flex:1;font-size:13px;font-weight:600;}
  .team.r{text-align:right;}
  .team.l{text-align:left;}
  .team.tbd{color:#7d92b5;font-style:italic;}
  .flagimg{width:22px;height:15px;object-fit:cover;border-radius:2px;vertical-align:middle;box-shadow:0 0 0 1px rgba(255,255,255,0.15);}
  .flagfb{display:inline-block;font-size:9px;font-weight:800;background:rgba(255,255,255,0.15);padding:2px 4px;border-radius:3px;vertical-align:middle;letter-spacing:.5px;}
  .tw{display:inline-flex;align-items:center;gap:5px;}
  .team .tw{display:inline-flex;}
  .team.r{justify-content:flex-end;}
  .match-time{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,0.08);padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700;color:#cfe;}
  .score{width:42px;height:42px;text-align:center;font-size:18px;font-weight:800;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:8px;outline:none;}
  .score:focus{border-color:#ffd23f;}
  .score:disabled{opacity:.5;background:rgba(255,255,255,0.05);}
  .score::-webkit-outer-spin-button,.score::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .x{color:#9fb3d4;font-weight:700;}
  .resline{margin-top:6px;font-size:12px;text-align:center;padding:3px;border-radius:6px;}
  .resline.pos{background:rgba(76,217,100,0.15);color:#8bf0a0;}
  .resline.zero{background:rgba(255,255,255,0.06);color:#9fb3d4;}
  .resline.live{background:rgba(255,90,90,0.16);color:#ff9b9b;}
  .rank{width:100%;border-collapse:collapse;margin-top:8px;}
  .rank th,.rank td{padding:9px 6px;text-align:center;font-size:14px;border-bottom:1px solid rgba(255,255,255,0.08);}
  .rank th{color:#9fb3d4;font-size:12px;text-transform:uppercase;}
  .rank td:nth-child(2){text-align:left;font-weight:600;}
  .rank .meRow{background:rgba(255,210,63,0.1);}
  .big-pts{font-weight:800;color:#ffd23f;font-size:16px;}
  .badge{display:inline-block;background:rgba(76,217,100,0.2);color:#8bf0a0;padding:5px 12px;border-radius:10px;font-size:13px;font-weight:700;}
  .badge.lock{background:rgba(255,210,63,0.2);color:#ffd23f;}
  .badge.open{background:rgba(120,170,255,0.2);color:#9fc4ff;}
  .badge.live{background:rgba(255,90,90,0.2);color:#ff9b9b;}
  .live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#ff5a5a;margin-right:4px;animation:pulse 1.2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  .rules ul{list-style:none;display:flex;flex-direction:column;gap:5px;margin:6px 0;}
  .rules li{font-size:14px;padding-left:4px;}
  .foot{text-align:center;color:#6f84a8;font-size:12px;padding:10px 0 20px;}
  .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#ffd23f;color:#0a1f44;padding:10px 20px;border-radius:10px;font-weight:700;font-size:14px;z-index:99;box-shadow:0 4px 16px rgba(0,0,0,.4);}
  .center{text-align:center;padding:60px 20px;color:#9fb3d4;}
  .spinner{width:36px;height:36px;border:4px solid rgba(255,255,255,0.15);border-top-color:#ffd23f;border-radius:50%;margin:0 auto 14px;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .lockbar{display:flex;align-items:center;gap:10px;justify-content:space-between;background:rgba(255,210,63,0.08);border:1px solid rgba(255,210,63,0.25);border-radius:10px;padding:10px 12px;flex-wrap:wrap;}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:6px;}
  .stat{background:rgba(0,0,0,0.22);border-radius:12px;padding:14px;text-align:center;}
  .stat .num{font-size:26px;font-weight:800;color:#ffd23f;}
  .stat .lbl{font-size:12px;color:#9fb3d4;margin-top:2px;}
  .bar-row{display:flex;align-items:center;gap:8px;margin:5px 0;font-size:13px;}
  .bar-row .nm{width:120px;flex-shrink:0;}
  .bar-track{flex:1;background:rgba(255,255,255,0.08);border-radius:6px;height:18px;overflow:hidden;}
  .bar-fill{height:100%;background:linear-gradient(90deg,#ffd23f,#ffb800);border-radius:6px;}
  .bar-val{width:42px;text-align:right;font-weight:700;color:#ffd23f;flex-shrink:0;}
  .adm-player{background:rgba(0,0,0,0.2);border-radius:10px;padding:10px;margin-bottom:8px;}
  .adm-player .ap-head{display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
  .adm-player .ap-name{font-weight:700;font-size:15px;}
  .adm-bets{margin-top:8px;font-size:13px;}
  .adm-bets table{width:100%;border-collapse:collapse;}
  .adm-bets td{padding:4px 4px;border-bottom:1px solid rgba(255,255,255,0.06);}
  .adm-bets td.sc{text-align:center;font-weight:700;width:60px;}
  .hl{color:#ffd23f;font-weight:700;}
  .gtable{width:100%;border-collapse:collapse;margin-top:6px;font-size:13px;}
  .gtable th{color:#9fb3d4;font-size:11px;text-transform:uppercase;padding:4px 3px;}
  .gtable td{padding:5px 3px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.07);}
  .gtable td.tn{text-align:left;font-weight:600;}
  .gtable tr.qual{background:rgba(76,217,100,0.1);}
  .gtable tr.qual3{background:rgba(255,210,63,0.08);}
  .gtable .pos-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;}
  .ko-stage{margin-bottom:6px;}
  .ko-tie{background:rgba(0,0,0,0.2);border-radius:10px;padding:10px;margin-bottom:9px;}
  .ko-label{font-size:11px;color:#9fb3d4;margin-bottom:5px;font-weight:700;}
  .ko-winner{margin-top:6px;font-size:12px;text-align:center;color:#8bf0a0;}
  .live-toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:#ff9b9b;cursor:pointer;}
  .seg{display:flex;gap:4px;margin:8px 0;flex-wrap:wrap;}
  .seg button{flex:1;min-width:70px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:#9fb3d4;padding:7px 4px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;}
  .seg button.on{background:rgba(255,210,63,0.85);color:#0a1f44;border-color:#ffd23f;}
  .trophy{text-align:center;font-size:14px;padding:14px;background:rgba(255,210,63,0.1);border-radius:12px;}
  .trophy .big{font-size:22px;font-weight:800;color:#ffd23f;margin-top:4px;}

var PTS = {EXATO:5, SALDO:3, RESULTADO:2, EMPATE:1, CAMPEAO:15, KO_EXATO:7, KO_RES:3};

/* JOGOS IGNORADOS NA PONTUAÇÃO
   Lista de IDs de jogos que NÃO devem contar pontos (anulados por motivos
   organizacionais, como o jogo de abertura quando ainda tinham apostas pendentes).
   Vale para ranking, premiação por rodada e ranking geral. */
var JOGOS_IGNORADOS = [1]; // Jogo 1: México x África do Sul (11/06) - anulado por problema técnico

/* ====== LÓGICA DE PONTUAÇÃO E CLASSIFICAÇÃO ====== */
function outcome(h,a){ return h>a?'H':(h<a?'A':'E'); }
function hasScore(o){ return o && o.h!=null && o.h!=='' && o.a!=null && o.a!==''; }
function isIgnoredMatch(id){ return JOGOS_IGNORADOS.indexOf(+id) !== -1; }

function scoreMatch(pal, real){
  if(!hasScore(pal) || !hasScore(real)) return null;
  var pH=+pal.h,pA=+pal.a,rH=+real.h,rA=+real.a;
  // placar exato
  if(pH===rH && pA===rA) return PTS.EXATO;
  // tipo de resultado: H (mandante), A (visitante), E (empate)
  var po = outcome(pH,pA), ro = outcome(rH,rA);
  // errou quem ganhou
  if(po !== ro) return 0;
  // acertou que foi empate mas placar errado: 1 pt
  if(ro === 'E') return PTS.EMPATE;
  // acertou vencedor + saldo de gols: 3 pts (só pra vitórias)
  if((pH-pA) === (rH-rA)) return PTS.SALDO;
  // acertou só o vencedor: 2 pts
  return PTS.RESULTADO;
}
/* mata-mata: placar exato 7, acertou quem passa 3, errou 0.
   Em empate no tempo normal, "quem passa" usa o vencedor marcado pelo admin. */
/* Pontuação no mata-mata baseada em QUEM SE CLASSIFICA.

   REGRAS:
   - Se ACERTOU quem se classifica:
     · Placar exato (vitória ou empate)          → 7 pts
     · Palpitou empate, deu empate com placar dif → 1 pt
     · Palpitou vitória, errou placar             → 3 pts
     · Palpitou empate, deu vitória do mesmo time → 3 pts (acertou quem passa)
   - Se ERROU quem se classifica:
     · Sempre 0 pts (mesmo cravando placar)
   
   pal: { h, a, classif } - palpite do jogador
   real: { h, a, winner, home, away } - resultado real */
function scoreKO(pal, real){
  if(!hasScore(pal) || !hasScore(real)) return null;
  
  var pH=+pal.h, pA=+pal.a, rH=+real.h, rA=+real.a;
  
  // Quem se classifica de verdade (definido pelo admin no winner)
  var realWinner = real.winner || '';
  if(!realWinner){
    if(rH > rA) realWinner = real.home;
    else if(rA > rH) realWinner = real.away;
    else return null; // empate sem winner definido = não pode pontuar ainda
  }
  
  // Quem o jogador palpitou que se classifica
  var palClassif = pal.classif || '';
  if(!palClassif){
    if(pH > pA) palClassif = real.home;
    else if(pA > pH) palClassif = real.away;
    else return 0; // palpitou empate sem indicar quem passa = 0 pts
  }
  
  // Errou quem se classifica? Zero pontos, sempre.
  if(palClassif !== realWinner) return 0;
  
  // Acertou quem se classifica. Agora analisa o placar:
  
  // 1) Placar exato (vitória ou empate cravado): 7 pts
  if(pH === rH && pA === rA) return PTS.KO_EXATO;
  
  // 2) Palpitou empate, deu empate com placar diferente: 1 pt
  if(pH === pA && rH === rA) return PTS.EMPATE; // 1 pt
  
  // 3) Demais casos onde acertou quem passa: 3 pts
  //    (palpitou vitória e errou placar, ou palpitou empate e deu vitória do mesmo time)
  return PTS.KO_RES;
}

/* Classificação automática de um grupo a partir dos resultados oficiais.
   Critérios: pontos, saldo, gols marcados, ordem alfabética (fallback). */
function groupTable(gKey, resMatches){
  var teams = GROUPS[gKey];
  var st = {};
  teams.forEach(function(t){ st[t]={t:t,j:0,v:0,e:0,d:0,gp:0,gc:0,sg:0,pts:0}; });
  MATCHES.forEach(function(m){
    if(m.g!==gKey) return;
    var r = resMatches[m.id];
    if(!hasScore(r)) return;
    var H=st[m.h], A=st[m.a], rH=+r.h, rA=+r.a;
    H.j++;A.j++; H.gp+=rH;H.gc+=rA; A.gp+=rA;A.gc+=rH;
    if(rH>rA){ H.v++;A.d++;H.pts+=3; }
    else if(rA>rH){ A.v++;H.d++;A.pts+=3; }
    else { H.e++;A.e++;H.pts++;A.pts++; }
  });
  var arr = teams.map(function(t){ var s=st[t]; s.sg=s.gp-s.gc; return s; });
  arr.sort(function(a,b){
    return b.pts-a.pts || b.sg-a.sg || b.gp-a.gp || a.t.localeCompare(b.t,'pt');
  });
  return arr;
}

function initFirebase(){
  if(!useFirebase) return Promise.resolve();
  return new Promise(function(resolve){

    var s1=document.createElement('script');
    s1.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js';
    s1.onload=function(){
      var s2=document.createElement('script');
      s2.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js';
      s2.onload=function(){
        try{
          firebase.initializeApp(FIREBASE_CONFIG);
          fbDB = firebase.database();
          // carrega tudo de uma vez para o cache e fica escutando mudanças
          fbDB.ref('/').on('value', function(snap){
            fbCache = snap.val() || {};
            if(fbReady && onCloudUpdate) onCloudUpdate();
            fbReady = true;
            resolve();
          });
          // timeout caso conexão falhe
          setTimeout(function(){ if(!fbReady){ fbReady=true; resolve(); } }, 6000);
        }catch(e){ console.error('Firebase init falhou', e); useFirebase=false; resolve(); }
      };
      s2.onerror=function(){ useFirebase=false; resolve(); };
      document.head.appendChild(s2);
    };
    s1.onerror=function(){ useFirebase=false; resolve(); };
    document.head.appendChild(s1);
  });
}

/* sanitiza chave para o Firebase (não aceita . # $ [ ] /) */
function fbKey(k){ return String(k).replace(/[.#$\[\]\/]/g,'_'); }

function sGet(key){
  if(useFirebase && fbDB){
    return Promise.resolve(fbCache[fbKey(key)] != null ? fbCache[fbKey(key)] : null);
  }
  // fallback localStorage
  try{
    var v = localStorage.getItem('bolao_'+key);
    return Promise.resolve(v ? JSON.parse(v) : null);
  }catch(e){ return Promise.resolve(null); }
}
function sSet(key, val){
  // PROTEÇÃO CRÍTICA: se for uma aposta vazia tentando sobrescrever uma com conteúdo, BLOQUEAR
  if(typeof key === 'string' && key.indexOf('bets:') === 0 && val && typeof val === 'object'){
    var temConteudo = (val.locked === true) ||
                      (val.champ && val.champ !== '') ||
                      (val.matches && Object.keys(val.matches).length > 0);
    if(!temConteudo){
      // val está vazio. Verifica se já existe algo gravado.
      if(useFirebase && fbDB){
        return fbDB.ref('/'+fbKey(key)).once('value').then(function(snap){
          var atual = snap.val();
          var atualTemConteudo = atual && (
            atual.locked === true ||
            (atual.champ && atual.champ !== '') ||
            (atual.matches && Object.keys(atual.matches).length > 0)
          );
          if(atualTemConteudo){
            console.warn('[Bolão] BLOQUEADO: tentativa de sobrescrever aposta de "'+key.substring(5)+'" com versão vazia!');
            return false;
          }
          // pode salvar (não tinha nada lá, ou também tava vazio)
          return fbDB.ref('/'+fbKey(key)).set(val).then(function(){
            fbCache[fbKey(key)] = val;
            return true;
          });
        }).catch(function(e){ console.error('Erro fb set', e); return false; });
      }
    }
  }
  // caminho normal
  if(useFirebase && fbDB){
    return fbDB.ref('/'+fbKey(key)).set(val).then(function(){
      fbCache[fbKey(key)] = val;
      return true;
    }).catch(function(e){ console.error('Erro fb set', e); return false; });
  }
  try{
    localStorage.setItem('bolao_'+key, JSON.stringify(val));
    return Promise.resolve(true);
  }catch(e){ return Promise.resolve(false); }
}

function ensureResults(r){

  KO_STAGES.forEach(function(s){

    while(r.ko[s.key].length<s.n) r.ko[s.key].push({home:'',away:'',h:'',a:'',live:false,winner:''});
  });
  return r;
}
function ensureBet(b){
  b=b||{};
  if(!b.matches) b.matches={};
  if(typeof b.champ!=='string') b.champ='';
  if(typeof b.locked!=='boolean') b.locked=false;
  if(!b.ko) b.ko={};

/* total de pontos de um jogador (grupos + campeão + mata-mata) */
function computePoints(bet){
  var out={total:0,exatos:0,acertos:0,grupos:0,ko:0,champ:0};
  if(!bet) return out;
  MATCHES.forEach(function(m){
    if(isIgnoredMatch(m.id)) return; // jogo anulado, não pontua
    var real=STATE.results.matches[m.id];
    if(!hasScore(real)) return;
    var s=scoreMatch((bet.matches||{})[m.id],real);
    if(s!=null){ out.total+=s; out.grupos+=s; if(s===PTS.EXATO)out.exatos++; if(s>0)out.acertos++; }
  });
  if(STATE.results.champ && bet.champ && STATE.results.champ===bet.champ){
    out.total+=PTS.CAMPEAO; out.champ=PTS.CAMPEAO;
  }
  KO_STAGES.forEach(function(stg){
    var rArr=(STATE.results.ko||{})[stg.key]||[];
    var bArr=(bet.ko||{})[stg.key]||[];
    rArr.forEach(function(real,i){
      var pal=bArr[i];
      var s=scoreKO(pal,real);
      if(s!=null){ out.total+=s; out.ko+=s; if(s===PTS.KO_EXATO)out.exatos++; if(s>0)out.acertos++; }
    });
  });
  return out;
}

  // só apostas TRAVADAS ficam visíveis, para ninguém copiar antes
  var visiveis = STATE.players.filter(function(p){
    return STATE.bets[p] && STATE.bets[p].locked;
  });
  var pendentes = STATE.players.filter(function(p){
    return !(STATE.bets[p] && STATE.bets[p].locked);
  });

  var html='<div class="card"><h2>👀 Apostas dos participantes</h2>'+
    '<p class="muted small">Para ser justo, a aposta de cada um fica visível para todos '+
    '<b>só depois de enviada e travada</b> — assim ninguém copia palpite de quem ainda está editando.</p>';
  if(pendentes.length){
    html+='<p class="muted small" style="margin-top:6px">⏳ Ainda não enviaram: '+
      pendentes.map(function(p){return esc(p);}).join(', ')+'</p>';
  }
  html+='</div>';

  if(!visiveis.length){
    html+='<div class="card"><p class="muted">Nenhuma aposta foi enviada ainda. '+
      'Assim que alguém travar os palpites, eles aparecem aqui para todos verem.</p></div>';
    return html;
  }

  visiveis.forEach(function(p){
    var b=ensureBet(STATE.bets[p]);
    var c=computePoints(b);
    var open=STATE.pubPlayer===p;
    var nFill=0;
    MATCHES.forEach(function(m){ if(hasScore((b.matches||{})[m.id])) nFill++; });

    html+='<div class="adm-player"><div class="ap-head" data-pub="'+esc(p)+'">'+
      '<span class="ap-name">'+esc(p)+(p===STATE.me?' (você)':'')+
      ' <span class="badge lock">🔒 enviada</span></span>'+
      '<span class="muted small">'+c.total+' pts · '+(open?'▲':'▼')+'</span></div>';

    if(open){
      html+='<div style="margin-top:8px">'+
        '<div class="muted small">🏆 Campeão palpitado: <b class="hl">'+
        (b.champ?(flag(b.champ)+' '+esc(b.champ)):'—')+'</b> · '+nFill+'/72 jogos preenchidos</div>';

      // palpites da fase de grupos
      var rowsG='';
      MATCHES.forEach(function(m){
        var pl=(b.matches||{})[m.id];
        if(hasScore(pl)){
          var real=STATE.results.matches[m.id];
          var s=hasScore(real)?scoreMatch(pl,real):null;
          var ptTxt=s!=null?'<td class="sc hl">+'+s+'</td>':'<td class="sc muted">—</td>';
          rowsG+='<tr><td>'+flag(m.h)+' '+esc(m.h)+' x '+esc(m.a)+' '+flag(m.a)+'</td>'+
            '<td class="sc">'+pl.h+' x '+pl.a+'</td>'+ptTxt+'</tr>';
        }
      });
      html+='<div class="adm-bets" style="margin-top:8px"><div class="ko-label">FASE DE GRUPOS</div>'+
        '<table>'+(rowsG||'<tr><td class="muted">Nenhum palpite de grupos.</td></tr>')+'</table></div>';

      // palpites do mata-mata
      var rowsK='';
      KO_STAGES.forEach(function(stg){
        var bArr=(b.ko||{})[stg.key]||[];
        var rArr=(STATE.results.ko||{})[stg.key]||[];
        bArr.forEach(function(pal,i){
          if(!hasScore(pal)) return; // só mostra palpites preenchidos
          var tie = rArr[i] || {};
          var s = (koTieDefined(tie) && hasScore(tie)) ? scoreKO(pal,tie) : null;
          var ptTxt = s!=null ? '<td class="sc hl">+'+s+'</td>' : '<td class="sc muted">—</td>';
          var jogoDesc;
          if(koTieDefined(tie)){
            // confronto já montado pelo admin
            jogoDesc = flag(tie.home)+' '+esc(tie.home)+' x '+esc(tie.away)+' '+flag(tie.away)+
              ' <span class="muted small">('+stg.nome+' · jogo '+(i+1)+')</span>';
          } else {
            // ainda sem confronto definido: mostra só palpite genérico
            jogoDesc = '<span class="muted">Confronto '+(i+1)+' do '+stg.nome+' (aguardando chaveamento)</span>';
          }
          rowsK += '<tr><td>'+jogoDesc+'</td>'+
            '<td class="sc">'+pal.h+' x '+pal.a+'</td>'+ptTxt+'</tr>';
        });
      });
      if(rowsK){
        html+='<div class="adm-bets" style="margin-top:8px"><div class="ko-label">MATA-MATA</div>'+
          '<table>'+rowsK+'</table></div>';
      }
      html+='</div>';
    }
    html+='</div>';
  });
  return html;
}

/* ---- ABA MATA-MATA ---- */
function koTieDefined(tie){ return tie && tie.home && tie.away; }

function mataHTML(){
  var bet=myBet();
  var locked=isLocked();
  var anyDefined = KO_STAGES.some(function(s){
    return (STATE.results.ko[s.key]||[]).some(koTieDefined);
  });

  var seg='<div class="seg">'+KO_STAGES.map(function(s){
    return '<button data-ko="'+s.key+'" class="'+(STATE.koView===s.key?'on':'')+'">'+
      s.nome.replace(' de final','').replace('Disputa de ','3º ')+'</button>';
  }).join('')+'</div>';

  var html='<div class="card"><h2>🥊 Mata-mata</h2>';
  if(!anyDefined){
    html+='<p class="muted">Os confrontos eliminatórios ainda não foram definidos. '+
      'Quando a fase de grupos terminar, o organizador monta o chaveamento (32-avos → final) e vocês poderão palpitar aqui.</p></div>';
    return html;
  }
  html+='<p class="muted small">Palpite o placar de cada jogo. Pontuação: <b class="hl">'+PTS.KO_EXATO+
    ' pts</b> placar exato · <b class="hl">'+PTS.KO_RES+' pts</b> acertar quem se classifica.</p>'+seg+'</div>';

  var stg=null; KO_STAGES.forEach(function(s){ if(s.key===STATE.koView) stg=s; });
  var rArr=STATE.results.ko[stg.key]||[];
  var bArr=(bet.ko||{})[stg.key]||[];

  var defined=rArr.filter(koTieDefined);
  if(!defined.length){
    html+='<div class="card"><h3>'+stg.nome+'</h3>'+
      '<p class="muted">Confrontos desta fase ainda não definidos pelo organizador.</p></div>';
    return html;
  }

  html+='<div class="card"><h3>'+stg.nome+'</h3><div class="matches">';
  rArr.forEach(function(tie,i){
    if(!koTieDefined(tie)) return;
    var pal=bArr[i]||{};
    var vH=(pal.h!=null&&pal.h!=='')?pal.h:'';
    var vA=(pal.a!=null&&pal.a!=='')?pal.a:'';
    var vClassif = pal.classif || '';
    var dis=locked?' disabled':'';
    var finished=hasScore(tie);
    var live=tie.live&&finished;
    // mostra seletor de classificação se o palpite for empate (ou se ainda não tem placar)
    var palEmpate = (vH !== '' && vA !== '' && +vH === +vA);
    var mostrarClassif = palEmpate || (vH === '' && vA === '');

    html+='<div class="ko-tie"><div class="ko-label">Jogo '+(i+1)+(live?' &nbsp;'+liveTag():'')+'</div>'+
      '<div class="match-row">'+
      '<span class="team r">'+teamR(tie.home)+'</span>'+
      '<input class="score koscore" type="number" min="0" max="99" data-ko="'+stg.key+'" data-idx="'+i+'" data-side="h" value="'+vH+'"'+dis+'>'+
      '<span class="x">x</span>'+
      '<input class="score koscore" type="number" min="0" max="99" data-ko="'+stg.key+'" data-idx="'+i+'" data-side="a" value="'+vA+'"'+dis+'>'+
      '<span class="team l">'+teamL(tie.away)+'</span></div>';

    // Seletor de quem se classifica (aparece sempre que for empate; opcional em vitória)
    var classifWrapStyle = palEmpate ? '' : 'display:none';
    html += '<div class="ko-classif" data-ko-classif-wrap="'+stg.key+'-'+i+'" style="margin-top:6px;'+classifWrapStyle+'">'+
      '<label class="muted small" style="display:block;margin-bottom:4px">Em caso de empate, quem se classifica?</label>'+
      '<select class="inp" data-koclassif="'+stg.key+'" data-idx="'+i+'"'+dis+' style="width:100%;font-size:13px">'+
      '<option value=""'+(vClassif===''?' selected':'')+'>— escolha quem passa —</option>'+
      '<option value="'+esc(tie.home)+'"'+(vClassif===tie.home?' selected':'')+'>'+esc(tie.home)+'</option>'+
      '<option value="'+esc(tie.away)+'"'+(vClassif===tie.away?' selected':'')+'>'+esc(tie.away)+'</option>'+
      '</select></div>';

    if(finished){
      var s=scoreKO(pal,tie);
      var cls=live?'live':(s>0?'pos':'zero');
      var passa=tie.winner?(' · classificado: '+flag(tie.winner)+' '+esc(tie.winner)):'';
      html+='<div class="resline '+cls+'">'+(live?'Parcial ao vivo: ':'Resultado: ')+
        tie.h+' x '+tie.a+(s!=null?' · +'+s+' pts':'')+passa+'</div>';
    }
    html+='</div>';
  });
  html+='</div>';
  if(!locked){
    html+='<p class="muted small" style="margin-top:8px">Use o botão "Enviar palpites" na aba 📝 Palpites para travar tudo (grupos + mata-mata).</p>';
  }
  html+='</div>';

  // troféu se a final tiver vencedor
  var fn=(STATE.results.ko.fn||[])[0];
  if(STATE.koView==='fn' && fn && fn.winner){
    html+='<div class="card"><div class="trophy">🏆 Campeão da Copa do Mundo 2026<div class="big">'+
      flag(fn.winner)+' '+esc(fn.winner)+'</div></div></div>';
  }
  return html;
}

/* ---- LÓGICA DE PREMIAÇÃO ---- */

/* Calcula pontos de um jogador apenas em uma rodada específica (1, 2 ou 3) */
function pointsByRound(bet, roundIdx){
  if(!bet) return 0;
  var r = RODADAS[roundIdx];
  if(!r) return 0;
  var total = 0;
  MATCHES.forEach(function(m){
    if(m.id < r.min || m.id > r.max) return;
    if(isIgnoredMatch(m.id)) return; // jogo anulado, não pontua
    var real = STATE.results.matches[m.id];
    if(!hasScore(real)) return;
    var s = scoreMatch((bet.matches||{})[m.id], real);
    if(s != null) total += s;
  });
  return total;
}

/* Retorna líderes por categoria: 3 rodadas + geral */
function getLeaders(){
  var rk = function(metric){
    var arr = STATE.players.map(function(p){
      var b = STATE.bets[p] || ensureBet({});
      return { nome: p, pts: metric(b) };
    }).filter(function(x){ return x.pts > 0; })
      .sort(function(a,b){ return b.pts - a.pts; });
    return arr;
  };
  return {
    r1: rk(function(b){ return pointsByRound(b, 0); }),
    r2: rk(function(b){ return pointsByRound(b, 1); }),
    r3: rk(function(b){ return pointsByRound(b, 2); }),
    geral: rk(function(b){ return computePoints(b).total; })
  };
}

/* formata valor em reais */
function brl(v){
  return 'R$ ' + v.toFixed(2).replace('.', ',');
}

function statBox(n,l){ return '<div class="stat"><div class="num">'+n+'</div><div class="lbl">'+l+'</div></div>'; }
function barRow(name,val,pct){
  return '<div class="bar-row"><span class="nm">'+name+'</span>'+
    '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%"></div></div>'+
    '<span class="bar-val">'+val+'</span></div>';
}
function dashHTML(){
  var players=STATE.players, nP=players.length;
  if(nP===0){
    return '<div class="card"><h2>📊 Dashboard</h2>'+
      '<p class="muted">Ainda não há jogadores. As estatísticas aparecem quando a galera começar a apostar.</p></div>';
  }
  var totalPalpites=0,enviadas=0,jogosResult=0;
  MATCHES.forEach(function(m){ if(hasScore(STATE.results.matches[m.id])) jogosResult++; });
  players.forEach(function(p){
    var b=STATE.bets[p]||{matches:{}};
    MATCHES.forEach(function(m){
      if(hasScore((b.matches||{})[m.id])) totalPalpites++;
    });
    if(b.locked) enviadas++;
  });
  // campeão mais apostado
  var champCount={};
  players.forEach(function(p){
    var c=(STATE.bets[p]||{}).champ;
    if(c) champCount[c]=(champCount[c]||0)+1;
  });
  var champRank=Object.keys(champCount).map(function(t){return {t:t,n:champCount[t]};})
    .sort(function(a,b){return b.n-a.n;});
  // jogos com placar repetido
  var consenso=[];
  MATCHES.forEach(function(m){
    var combo={};
    players.forEach(function(p){
      var pl=((STATE.bets[p]||{}).matches||{})[m.id];
      if(hasScore(pl)){ var k=pl.h+'-'+pl.a; combo[k]=(combo[k]||0)+1; }
    });
    var bk=null,bn=0;
    for(var k in combo){ if(combo[k]>bn){ bn=combo[k]; bk=k; } }
    if(bn>=2) consenso.push({m:m,placar:bk.replace('-',' x '),n:bn});
  });
  consenso.sort(function(a,b){return b.n-a.n;});
  // times mais apostados para vencer
  var winCount={}; ALL_TEAMS.forEach(function(t){winCount[t]=0;});
  players.forEach(function(p){
    var b=STATE.bets[p]||{matches:{}};
    MATCHES.forEach(function(m){
      var pl=(b.matches||{})[m.id];
      if(hasScore(pl)){
        if(+pl.h>+pl.a) winCount[m.h]++;
        else if(+pl.a>+pl.h) winCount[m.a]++;
      }
    });
  });
  var winRank=Object.keys(winCount).map(function(t){return {t:t,n:winCount[t]};})
    .filter(function(x){return x.n>0;}).sort(function(a,b){return b.n-a.n;});

  var html='<div class="card"><h2>📊 Dashboard de estatísticas</h2>'+
    '<div class="stat-grid">'+
    statBox(nP,'Jogadores')+statBox(enviadas,'Apostas enviadas')+
    statBox(jogosResult+'/72','Jogos com resultado')+
    statBox(consenso.length,'Jogos com placar repetido')+
    '</div></div>';

  html+='<div class="card"><h3>🏆 Campeão mais apostado</h3>';
  if(champRank.length){
    var mc=champRank[0].n;
    html+=champRank.slice(0,8).map(function(r){
      return barRow(flag(r.t)+' '+esc(r.t),r.n,Math.round(r.n/mc*100));
    }).join('');
  } else html+='<p class="muted">Ninguém escolheu o campeão ainda.</p>';
  html+='</div>';

  html+='<div class="card"><h3>📈 Times mais apostados para vencer</h3>'+
    '<p class="muted small">Soma de vitórias previstas por time, juntando os palpites de todos.</p>';
  if(winRank.length){
    var mw=winRank[0].n;
    html+=winRank.slice(0,10).map(function(r){
      return barRow(flag(r.t)+' '+esc(r.t),r.n,Math.round(r.n/mw*100));
    }).join('');
  } else html+='<p class="muted">Sem palpites suficientes ainda.</p>';
  html+='</div>';

  html+='<div class="card"><h3>🤝 Onde a galera concordou</h3>'+
    '<p class="muted small">Jogos em que o mesmo placar foi escolhido por 2+ jogadores.</p>';
  if(consenso.length){
    html+=consenso.slice(0,12).map(function(c){
      return '<div class="bar-row"><span style="flex:1">'+
        flag(c.m.h)+' '+esc(c.m.h)+' x '+esc(c.m.a)+' '+flag(c.m.a)+'</span>'+
        '<span class="hl">'+c.placar+'</span><span class="bar-val">'+c.n+'×</span></div>';
    }).join('');
  } else html+='<p class="muted">Nenhum placar repetido entre os jogadores até agora.</p>';
  html+='</div>';
  return html;
}

/* Converte "11/06" + "16h00" em data ordenável (assume ano 2026) */
function matchTimestamp(m){
  var d = m.date.split('/');
  var t = m.time.replace('h', ':');
  // Copa começa em junho (mês 6). Junho-julho = mesmo ano 2026.
  // Mas alguns jogos têm hora 00h-01h da madrugada, são do dia seguinte na verdade,
  // mas para fins de ordenação usamos a data informada mesmo.
  return new Date('2026-' + d[1] + '-' + d[0] + 'T' + t + ':00-03:00').getTime();
}

/* Próximos jogos (sem resultado) ordenados por data; jogos ao vivo vêm primeiro */
function getNextMatches(qtd){
  var pendentes = MATCHES.filter(function(m){
    var r = STATE.results.matches[m.id] || {};
    return !hasScore(r); // sem placar oficial salvo
  });
  // ao vivo primeiro, depois ordem cronológica
  pendentes.sort(function(a,b){
    var ra = STATE.results.matches[a.id] || {};
    var rb = STATE.results.matches[b.id] || {};
    if(ra.live && !rb.live) return -1;
    if(rb.live && !ra.live) return 1;
    return matchTimestamp(a) - matchTimestamp(b);
  });
  return pendentes.slice(0, qtd || 3);
}

/* admin: ver/gerenciar apostas */
function adminApostasHTML(){
  if(!STATE.players.length){
    return '<div class="card"><h3>👥 Apostas dos jogadores</h3>'+
      '<p class="muted">Ninguém entrou ainda.</p></div>';
  }

  // categorizar jogadores
  var completos = [], incompletos = [], abertos = [];
  STATE.players.forEach(function(p){
    var b = STATE.bets[p] || ensureBet({});
    var nFill = 0;
    MATCHES.forEach(function(m){ if(hasScore((b.matches||{})[m.id])) nFill++; });
    var info = { nome: p, bet: b, nFill: nFill, locked: !!b.locked, champ: b.champ };
    if(!info.locked){
      abertos.push(info);
    } else if(nFill === 72 && b.champ){
      completos.push(info);
    } else {
      incompletos.push(info);
    }
  });

  var total = STATE.players.length;

  // PAINEL DE STATUS no topo
  var html = '<div class="card"><h3>📊 Status dos envios</h3>'+
    '<div class="stat-grid" style="margin-top:6px">'+
    statBox(total, 'Total de jogadores')+

      '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">';

    });
    html += '</div></div>';
  }

  if(incompletos.length > 0){
    html += '<div class="card" style="background:rgba(255,210,63,0.08);border-color:rgba(255,210,63,0.3)">'+
      '<h3>⚠️ Enviaram INCOMPLETO ('+incompletos.length+')</h3>'+
      '<p class="muted small">Travaram a aposta sem preencher tudo. Vão perder pontos nos jogos em branco.</p>'+
      '<div style="display:flex;flex-direction:column;gap:6px;margin-top:8px">';
    incompletos.forEach(function(j){
      var problemas = [];

        '<button class="btn danger sm" data-unlock="'+esc(j.nome)+'">🔓 Liberar p/ correção</button>'+

    });
    html += '</div></div>';
  }

  if(completos.length > 0){
    html += '<div class="card" style="background:rgba(76,217,100,0.06);border-color:rgba(76,217,100,0.25)">'+
      '<h3>✅ Apostas completas e enviadas ('+completos.length+')</h3>'+
      '<p class="muted small">Tudo preenchido (72 jogos + campeão) e travado.</p>'+
      '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">';
    completos.forEach(function(j){
      html += '<div style="background:rgba(76,217,100,0.1);padding:6px 10px;border-radius:8px;font-size:13px">'+
        '<b>'+esc(j.nome)+'</b> 🏆 <span class="muted small">'+esc(j.champ)+'</span></div>';
    });
    html += '</div></div>';
  }

  // Lista completa expandível (mantém o que já tinha)
  html += '<div class="card"><h3>👥 Apostas detalhadas ('+STATE.players.length+')</h3>'+
    '<p class="muted small">Clique em cada jogador para ver os palpites e (se quiser) liberar a aposta para correção.</p></div>';

  STATE.players.forEach(function(p){
    var b = STATE.bets[p] || ensureBet({});
    var locked = !!b.locked;
    var nFill = 0;
    MATCHES.forEach(function(m){ if(hasScore((b.matches||{})[m.id])) nFill++; });
    var open = STATE.expandPlayer === p;

    var statusBadge;
    if(!locked) statusBadge = '<span class="badge open">✏️ aberta</span>';
    else if(nFill === 72 && b.champ) statusBadge = '<span class="badge">✅ completa</span>';
    else statusBadge = '<span class="badge lock">⚠️ incompleta</span>';

    html += '<div class="adm-player"><div class="ap-head" data-player="'+esc(p)+'">'+
      '<span class="ap-name">'+esc(p)+' '+statusBadge+
      '</span><span class="muted small">'+nFill+'/72 · '+(open?'▲':'▼')+'</span></div>';
    if(open){
      html += '<div style="margin-top:8px">'+
        '<div class="muted small">Campeão palpitado: <b class="hl">'+
        (b.champ ? (flag(b.champ)+' '+esc(b.champ)) : '— (em branco)')+'</b></div>';
      if(locked){
        html += '<button class="btn danger sm" data-unlock="'+esc(p)+'" style="margin:8px 0">🔓 Liberar aposta para correção</button>';
      } else {
        html += '<div class="muted small" style="margin:6px 0">Aposta em aberto — o jogador ainda pode editar.</div>';
      }
      var rowsB = '';
      MATCHES.forEach(function(m){
        var pl = (b.matches||{})[m.id];
        if(hasScore(pl)) rowsB += '<tr><td>'+esc(m.h)+' x '+esc(m.a)+'</td><td class="sc">'+pl.h+' x '+pl.a+'</td></tr>';
      });
      html += '<div class="adm-bets"><div class="ko-label">FASE DE GRUPOS</div><table>'+(rowsB||'<tr><td class="muted">Nenhum palpite preenchido.</td></tr>')+'</table></div>';

      // palpites do mata-mata
      var rowsK = '';
      KO_STAGES.forEach(function(stg){
        var bArr = (b.ko||{})[stg.key] || [];
        var rArr = (STATE.results.ko||{})[stg.key] || [];
        bArr.forEach(function(pal, i){
          if(!hasScore(pal)) return;
          var tie = rArr[i] || {};
          var jogoDesc = koTieDefined(tie)
            ? esc(tie.home)+' x '+esc(tie.away)+' <span class="muted small">('+stg.nome+')</span>'
            : '<span class="muted">Confronto '+(i+1)+' · '+stg.nome+' (aguardando chaveamento)</span>';
          rowsK += '<tr><td>'+jogoDesc+'</td><td class="sc">'+pal.h+' x '+pal.a+'</td></tr>';
        });
      });
      if(rowsK){
        html += '<div class="adm-bets" style="margin-top:6px"><div class="ko-label">MATA-MATA</div><table>'+rowsK+'</table></div>';
      }
      html += '</div>';
    }
    html += '</div>';
  });
  return html;
}

function doEnter(){
  var nome=el('nameInput').value.trim();
  if(!nome){ toast('Digite seu nome'); return; }

  // PROTEÇÃO CRÍTICA: verifica se já existe aposta no Firebase com esse nome
  // antes de criar uma vazia. Isso evita apagar dados de quem volta no app.
  var verificarExistente = useFirebase && fbDB
    ? fbDB.ref('/bets:'+fbKey(nome)).once('value').then(function(snap){
        return snap.val(); // retorna a aposta existente ou null
      }).catch(function(){ return null; })
    : sGet('bets:'+nome);

  verificarExistente.then(function(apostaExistente){
    if(apostaExistente){
      // já existe aposta com esse nome: NÃO sobrescreve, só carrega
      STATE.bets[nome] = ensureBet(apostaExistente);
      console.log('[Bolão] Aposta existente carregada para', nome);
    } else {
      // nome novo: cria aposta vazia
      STATE.bets[nome] = ensureBet({});
      sSet('bets:'+nome, STATE.bets[nome]);
      console.log('[Bolão] Nova aposta criada para', nome);
    }

    if(STATE.players.indexOf(nome) === -1){
      STATE.players.push(nome);
      sSet('players', STATE.players);
    }

    STATE.me = nome;
    sSet('currentUser', nome);
    toast('Bem-vindo, '+nome+'!');
    render();
  });
}

/* preenche os 32-avos com 1º, 2º e melhores 3º das tabelas atuais */
function autoFillR32(){
  var first=[],second=[],thirds=[];
  Object.keys(GROUPS).forEach(function(gk){
    var t=groupTable(gk,STATE.results.matches);
    first.push(t[0].t); second.push(t[1].t);
    thirds.push({t:t[2].t,pts:t[2].pts,sg:t[2].sg,gp:t[2].gp,g:gk});
  });
  thirds.sort(function(a,b){ return b.pts-a.pts||b.sg-a.sg||b.gp-a.gp; });
  var best8=thirds.slice(0,8).map(function(x){return x.t;});
  // 32 classificados: 12 primeiros + 12 segundos + 8 terceiros
  var pool=first.concat(second).concat(best8);
  // emparelha sequencialmente (chaveamento simples; admin ajusta como quiser depois)
  var arr=STATE.results.ko.r32;
  for(var i=0;i<16;i++){
    arr[i].home=pool[i*2]||'';
    arr[i].away=pool[i*2+1]||'';
  }
  render();
  toast('32-avos preenchidos. Ajuste os confrontos como quiser e salve.');
}

/* ====== INICIALIZAÇÃO ====== */
function loadAll(){
  return sGet('players').then(function(pl){
    STATE.players = pl || [];
    return sGet('results');
  }).then(function(res){
    STATE.results = ensureResults(res);
    return sGet('premio');
  }).then(function(pr){
    if(pr && typeof pr === 'object'){
      STATE.premio.valor = (pr.valor != null) ? +pr.valor : STATE.premio.valor;
      STATE.premio.participantes = (pr.participantes != null) ? +pr.participantes : STATE.premio.participantes;
    }

    // Busca TODAS as apostas no Firebase (chaves começando com "bets:")
    // Lê DIRETO do banco, não do cache, para garantir dados atualizados.
    STATE.bets = {};
    var nomesDetectados = [];

    var carregarBets = useFirebase && fbDB
      ? fbDB.ref('/').once('value').then(function(snap){
          var todo = snap.val() || {};
          console.log('[Bolão] Dados raw do Firebase:', Object.keys(todo).length, 'chaves');
          var listaBets = [];
          for(var key in todo){
            if(key.indexOf('bets:') === 0){
              listaBets.push(key);
              var nome = key.substring(5);
              STATE.bets[nome] = ensureBet(todo[key]);
              if(nomesDetectados.indexOf(nome) === -1) nomesDetectados.push(nome);
            }
          }
          console.log('[Bolão] Apostas encontradas no Firebase:', listaBets.length);
          console.log('[Bolão] Nomes:', nomesDetectados);
          // atualiza o cache local também
          fbCache = todo;
          return Promise.resolve();
        }).catch(function(e){
          console.error('[Bolão] Erro lendo Firebase:', e);
          // fallback: usa cache
          for(var key in fbCache){
            if(key.indexOf('bets:') === 0){
              var nome = key.substring(5);
              STATE.bets[nome] = ensureBet(fbCache[key]);
              if(nomesDetectados.indexOf(nome) === -1) nomesDetectados.push(nome);
            }
          }
          return Promise.resolve();
        })
      : Promise.resolve().then(function(){
          // sem firebase: carrega via sGet (localStorage)
          var loads = (STATE.players||[]).map(function(p){
            return sGet('bets:'+p).then(function(b){
              if(b){
                STATE.bets[p] = ensureBet(b);
                if(nomesDetectados.indexOf(p) === -1) nomesDetectados.push(p);
              }
            });
          });
          return Promise.all(loads);
        });

    return carregarBets.then(function(){
      // Une com a lista 'players' (nomes registrados mas sem bets)
      (STATE.players||[]).forEach(function(p){
        if(nomesDetectados.indexOf(p) === -1) nomesDetectados.push(p);
      });

      // Atualiza lista oficial
      STATE.players = nomesDetectados.sort(function(a,b){
        return a.localeCompare(b,'pt');
      });

      console.log('[Bolão] Total de jogadores carregados:', STATE.players.length);
    });
  });
}

function init(){
  initFirebase().then(function(){
    // configura sincronização em tempo real (só com Firebase)
    onCloudUpdate = function(){
      loadAll().then(render);
    };

    return loadAll();
  }).then(function(){
    // currentUser fica só no dispositivo (não na nuvem) — cada um entra com seu nome
    var cu = null;
    try{ cu = JSON.parse(localStorage.getItem('bolao_currentUser')||'null'); }catch(e){}
    if(cu && STATE.players.indexOf(cu)!==-1) STATE.me = cu;

    // sobrescreve sSet de currentUser para guardar localmente apenas
    var origSet = sSet;
    sSet = function(key, val){
      if(key === 'currentUser'){
        try{ localStorage.setItem('bolao_currentUser', JSON.stringify(val)); }catch(e){}
        return Promise.resolve(true);
      }
      return origSet(key, val);
    };

    render();

    // aviso visual se ainda está usando localStorage (sem Firebase)
    if(!useFirebase){
      setTimeout(function(){
        var w = document.createElement('div');
        w.style.cssText = 'position:fixed;bottom:10px;left:10px;right:10px;max-width:600px;margin:0 auto;background:rgba(255,90,90,0.95);color:#fff;padding:10px 14px;border-radius:10px;font-size:13px;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.4);';
        w.innerHTML = '⚠️ <b>Modo local:</b> dados ficam só neste dispositivo. Configure o Firebase para sincronizar entre amigos. <span style="cursor:pointer;float:right;font-weight:bold" onclick="this.parentNode.remove()">✕</span>';
        document.body.appendChild(w);
      }, 500);
    }
  }).catch(function(err){
    el('app').innerHTML='<div class="card"><h2>Erro ao carregar</h2><p class="muted">'+esc(String(err))+'</p></div>';
  });
}
init();
</script>
</body>
</html>
